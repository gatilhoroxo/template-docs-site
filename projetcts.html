---
layout: default
title: Projetos
---
<h1>Projetos</h1>

<ul>
    {% for project in site.projects %}
        <li>
            <h2><a href="{{ project.url }}">{{ project.name }}</a></h2>
            <h3>{{ project.level }}</h3>
            <p>{{ project.content | markdownify }}</p>
        </li>
    {% endfor %}
</ul>
